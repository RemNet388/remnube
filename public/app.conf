server {
    server_name vps-5222877-x.dattaweb.com;

    root /var/www/html/app/public;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/app/public/.well-known/acme-challenge/;
        try_files $uri =404;
        default_type "text/plain";
        allow all;
    }

    location ~ /\.ht {
        deny all;
    }

    error_log /var/log/nginx/app_error.log;
    access_log /var/log/nginx/app_access.log;

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/vps-5222877-x.dattaweb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vps-5222877-x.dattaweb.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name vps-5222877-x.dattaweb.com;

    root /var/www/html/app/public;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/app/public/.well-known/acme-challenge/;
        try_files $uri =404;
        default_type "text/plain";
        allow all;
    }

    location ~ /\.ht {
        deny all;
    }

    error_log /var/log/nginx/app_http_error.log;
    access_log /var/log/nginx/app_http_access.log;
}
