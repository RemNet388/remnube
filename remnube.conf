# ============================================
# HTTPS - remnube.com y www.remnube.com
# ============================================
server {
    server_name remnube.com www.remnube.com;

    # Página base
    root /var/www/base;
    index index.php index.html index.htm;

    # Página principal
    location / {
        try_files $uri $uri/ =404;
    }

    # Laravel en /sistema
    location /sistema {
        alias /var/www/remnube/public;
        index index.php;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Procesar PHP para /sistema
    location ~ ^/sistema/(.+\.php)$ {
        alias /var/www/remnube/public/$1;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/remnube/public/$1;
    }

    # Archivos estáticos de Laravel
    location ~ ^/sistema/(.*)\.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        alias /var/www/remnube/public/$1;
        access_log off;
        expires 30d;
    }

    # Validación Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/base/.well-known/acme-challenge/;
        try_files $uri =404;
        default_type "text/plain";
        allow all;
    }

    # Seguridad
    location ~ /\.ht {
        deny all;
    }

    # ================================
    # SSL (Certbot)
    # ================================
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/remnube.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remnube.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    error_log /var/log/nginx/remnube_error.log;
    access_log /var/log/nginx/remnube_access.log;
}

# ============================================
# HTTP - sin redirección forzada
# ============================================
server {
    listen 80;
    server_name remnube.com www.remnube.com;

    root /var/www/base;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    location /sistema {
        alias /var/www/remnube/public;
        index index.php;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/sistema/(.+\.php)$ {
        alias /var/www/remnube/public/$1;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/remnube/public/$1;
    }

    location ~ ^/sistema/(.*)\.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        alias /var/www/remnube/public/$1;
        access_log off;
        expires 30d;
    }

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/base/.well-known/acme-challenge/;
        try_files $uri =404;
        default_type "text/plain";
        allow all;
    }

    location ~ /\.ht {
        deny all;
    }

    error_log /var/log/nginx/remnube_http_error.log;
    access_log /var/log/nginx/remnube_http_access.log;
}
